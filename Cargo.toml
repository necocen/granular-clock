[package]
name = "granular-clock"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", features = ["dynamic_linking", "free_camera", "experimental_bevy_ui_widgets"] }
rayon = "1.11"
rand = "0.9"
parking_lot = "0.12.5"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
