# Global simulation settings shared by CPU/GPU paths.
[simulation]
# Gravity acceleration [m/s^2]
gravity = [0.0, -9.80665, 0.0]

# Particle population and size.
[simulation.particle]
# Particle radius [m]
large_radius = 0.01
small_radius = 0.005
# Number of particles by type
num_large = 160
num_small = 1440

# Particle-particle contact material properties.
[simulation.particle.material]
# Density [kg/m^3]
density = 2000.0
# Elastic model parameters
youngs_modulus = 1.0e7
poisson_ratio = 0.25
# Collision/friction parameters
restitution = 0.9
friction = 0.3
rolling_friction = 0.1

# Container box dimensions.
[simulation.container.box]
# Full box size [m] (not half extents)
size = [0.4, 0.7, 0.1]
# Box center position in world coordinates [m]
center = [0.0, -0.05, 0.0]

# Divider geometry inside the container.
[simulation.container.divider]
# Divider height from container floor [m]
height = 0.17
# Divider thickness [m]
thickness = 0.01

# Particle-wall contact properties.
[simulation.container.material]
# Penalty-model wall stiffness/damping
stiffness = 10000.0
damping = 20.0
# Wall friction and restitution
restitution = 0.7
friction = 0.3

# Vertical sinusoidal oscillation of the container.
[simulation.oscillation]
# Amplitude [m], frequency [Hz]
amplitude = 0.037
frequency = 33.0

# Integration step settings.
[simulation.step]
# Substep time interval [s]
dt = 0.0004
# Number of physics substeps per rendered frame
substeps_per_frame = 10

# UI slider ranges for runtime controls.
[ui.oscillation]
amplitude = { min = 0.001, max = 0.1, step = 0.001 }
frequency = { min = 1.0, max = 50.0, step = 1.0 }

[ui.step]
substeps_per_frame = { min = 1, max = 20, step = 1 }

[ui.container]
divider_height = { min = 0.03, max = 0.47, step = 0.001 }

[ui.contact]
particle_restitution = { min = 0.0, max = 1.0, step = 0.01 }
particle_friction = { min = 0.0, max = 2.0, step = 0.01 }
wall_restitution = { min = 0.0, max = 1.0, step = 0.01 }
wall_friction = { min = 0.0, max = 2.0, step = 0.01 }
