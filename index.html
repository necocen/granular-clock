<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:locale" content="en_US">
    <meta property="og:title" content="Granular Clock Simulator">
    <meta property="og:description" content="A granular clock simulator built with Rust and WebGPU.">
    <meta property="og:image" content="https://granular.necocen.info/assets/ogp.png">
    <meta property="og:url" content="https://granular.necocen.info/">
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:site" content="@necocen">
    <title>Granular Clock</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
        }
        canvas {
            position: fixed;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
        }
        #text-display {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 10;
            background-color: rgba(128, 128, 128, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: -apple-system, Roboto, sans-serif;
        }
        #text-display a {
            color: white;
            text-decoration: underline;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading Granular Clock...</p>
        <p style="font-size: 14px; color: #888;">WebGPU required</p>
    </div>
    <div id="text-display">Granular Clock Simulator<br>GitHub: <a href="https://github.com/necocen/granular-clock" target="_blank">necocen/granular-clock</a></div>
    <link
        data-trunk
        rel="rust"
        data-type="main"
        data-wasm-opt="z"
        data-no-default-features
    />
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="copy-file" href="_headers" />
    <script>
        function hideLoading() {
            const loading = document.getElementById("loading");
            if (!loading) return;
            loading.style.display = "none";
        }

        function showLoadingError(message) {
            document.getElementById("loading").innerHTML = `
                <p style="color: #e74c3c;">${message}</p>
                <p style="font-size: 14px; color: #888;">Check browser console for details.</p>
            `;
        }

        window.addEventListener("TrunkApplicationStarted", () => {
            requestAnimationFrame(hideLoading);
        });

        window.addEventListener("TrunkApplicationError", (event) => {
            console.error("Failed to bootstrap wasm app:", event);
            showLoadingError("Failed to initialize WebAssembly app");
        });

        window.addEventListener("load", function() {
            if (!navigator.gpu) {
                showLoadingError("WebGPU is not supported");
            }
        });
    </script>
</body>
</html>
